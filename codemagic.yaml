workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      vars:
        BUNDLE_ID: com.jcode.mobile
        SCHEME: JCodeMobile
        TEAM_ID: TAS6ARKDN7
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd ios
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number
        script: |
          BUILD_NUMBER=$PROJECT_BUILD_NUMBER
          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          echo "Build number: $BUILD_NUMBER"
      - name: Build
        script: |
          cd ios
          xcodebuild build-for-testing \
            -project JCodeMobile.xcodeproj \
            -scheme $SCHEME \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            || true
          xcodebuild archive \
            -project JCodeMobile.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/JCodeMobile.xcarchive \
            CURRENT_PROJECT_VERSION=$PROJECT_BUILD_NUMBER \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$TEAM_ID
      - name: Export IPA
        script: |
          cd ios
          xcode-project build-ipa \
            --archive-path build/JCodeMobile.xcarchive \
            --export-options-plist ExportOptions.plist
    artifacts:
      - ios/build/ios/ipa/*.ipa
      - ios/build/JCodeMobile.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "App Store Connect Users"
