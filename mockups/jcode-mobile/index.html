<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile mockups</title>
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js" defer></script>
</head>
<body class="gallery">
  <div class="gallery-header">
    <h1>jcode mobile</h1>
    <p>Themeable mobile mockups of the iOS app shell.</p>
    <div class="gallery-toolbar">
      <div class="theme-toggle-label">Theme</div>
      <div class="theme-toggle">
        <a class="theme-link" data-theme-link="neon" href="?theme=neon">Neon</a>
        <a class="theme-link" data-theme-link="catppuccin" href="?theme=catppuccin">Catppuccin Mocha</a>
      </div>
    </div>
  </div>
  <div class="screen-grid">
    <section class="screen-card">
      <iframe class="screen-frame" src="onboarding.html"></iframe>
    </section>
    <section class="screen-card">
      <iframe class="screen-frame" src="connect.html"></iframe>
    </section>
    <section class="screen-card">
      <header>Chat</header>
      <iframe class="screen-frame" src="chat.html"></iframe>
    </section>
    <section class="screen-card">
      <header>Sessions</header>
      <iframe class="screen-frame" src="sessions.html"></iframe>
    </section>
    <section class="screen-card">
      <header>Settings</header>
      <iframe class="screen-frame" src="settings.html"></iframe>
    </section>
    <section class="screen-card">
      <header>Add Server</header>
      <iframe class="screen-frame" src="add-server.html"></iframe>
    </section>
    <section class="screen-card">
      <header>Interrupt</header>
      <iframe class="screen-frame" src="interrupt.html"></iframe>
    </section>
    <section class="screen-card">
      <header>QR Scanner</header>
      <iframe class="screen-frame" src="qr-scanner.html"></iframe>
    </section>
  </div>
</body>
</html>
